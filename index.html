<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>UNIS POUR TOUS</title>
		<link rel="stylesheet" href="https://samoolean.github.io/Unispourtous/css/index.css">

	</head>
	<body>
		
		<canvas id="bg"></canvas>
		
		<script type="module">
			import * as THREE from 'https://unpkg.com/three/build/three.module.js';

			const scene = new THREE.Scene();
			const camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 0.1, 1000 );

			const renderer = new THREE.WebGLRenderer({
  			canvas: document.querySelector('#bg'),
			});
			
			renderer.setSize( window.innerWidth, window.innerHeight );
			document.body.appendChild( renderer.domElement );

			const geometry = new THREE.BoxGeometry( 5, 5, 5 );
			const material = new THREE.MeshBasicMaterial( { color: 0xcc0052 } );
			const cube = new THREE.Mesh( geometry, material );
			scene.add( cube );
			
			const spaceTexture = new THREE.TextureLoader().load('img/space.jpg');
			scene.background = spaceTexture;
			
			const MP1 = new THREE.TextureLoader().load('img/texture/MP1.jpg');

			const P1 = new THREE.Mesh(new THREE.SphereGeometry(16, 32, 32), new THREE.MeshBasicMaterial({ map : MP1 }));
                        scene.add( P1 );

			camera.position.z = 50;

			function animate() {
				requestAnimationFrame( animate );

				cube.rotation.x += 0.01;
				cube.rotation.y += 0.01;
				P1.position.y += 0.03;

				renderer.render( scene, camera );
			}

			animate();
		</script>
	</body>
</html>
