<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>UNIS POUR TOUS</title>
		<link rel="stylesheet" href="https://samoolean.github.io/Unispourtous/css/index.css">

	</head>
	<body>
		
		<canvas id="bg"></canvas>
			
			<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

			<script sync type="importmap">
			  {
			    "imports": {
			      "three": "https://samoolean.github.io/Unispourtous/js/three.module.js",
			      "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
			    }
			  }
			</script>

			
		<script type="module">
			//import * as THREE from 'https://unpkg.com/browse/three@0.150.1/build/three.module.js';
			import * as THREE from 'three';
  			//import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

			const scene = new THREE.Scene();
			const camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 0.1, 1000 );
			const loader = new GLTFLoader();
			
			let Wtop = window.screenTop;
			let Wleft = window.screenLeft;
			
			loader.load(
				// resource URL
				'3D/scene.gltf',
				// called when the resource is loaded
				function ( gltf ) {

					scene.add( gltf.scene );

					/*gltf.animations; // Array<THREE.AnimationClip>
					gltf.scene; // THREE.Group
					gltf.scenes; // Array<THREE.Group>
					gltf.cameras; // Array<THREE.Camera>
					gltf.asset; // Object*/

				},
				// called while loading is progressing
				function ( xhr ) {

					console.log( ( xhr.loaded / xhr.total * 100 ) + '% loaded' );

				},
				// called when loading has errors
				function ( error ) {

					console.log( 'An error happened' );

				}
			);

			const renderer = new THREE.WebGLRenderer({
  			canvas: document.querySelector('#bg'),
			});
			
			renderer.setSize( window.innerWidth, window.innerHeight );
			document.body.appendChild( renderer.domElement );
			
			/*
			const geometry = new THREE.BoxGeometry( 5, 5, 5 );
			const material = new THREE.MeshBasicMaterial( { color: 0xcc0052 } );
			const cube = new THREE.Mesh( geometry, material );
			scene.add( cube );
			
			
			const spaceTexture = new THREE.TextureLoader().load('img/space.jpg');
			scene.background = spaceTexture;
			
			const MP1 = new THREE.TextureLoader().load('img/texture/MP1.jpg');

			const P1 = new THREE.Mesh(new THREE.SphereGeometry(20, 64, 32), new THREE.MeshBasicMaterial({ map : MP1 }));
                        scene.add( P1 );
			*/

			camera.position.z = 50;

			function animate() {
				requestAnimationFrame( animate );
				
				/*
				cube.rotation.x += 0.01;
				cube.rotation.y += 0.01;
				
				P1.rotation.y += 0.005;
				P1.rotation.x += -0.005;
				P1.position.y == Wleft;
				P1.position.x == Wtop;
				*/
				
				renderer.render( scene, camera );
			}

			animate();
			
			//v 1.0.0.4
			
		</script>
	</body>
</html>
