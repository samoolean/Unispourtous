<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>UNIS POUR TOUS</title>
		<link rel="stylesheet" href="css/inscription.css">
		<style>
			body { margin: 0; }
		</style>
	</head>

	<body>
		
		<link href='https://fonts.googleapis.com/css?family=Raleway' rel='stylesheet' type='text/css'>

		<h1>Inscription</h1>
		<div class="form-container">
		  <form action="#" method="post" enctype="text/plain">
		    <fieldset>
		      <legend>Inscription newsletter</legend>

		      <label for="email">
			<span>
			  <input type="email" name="email" id="email" placeholder="johndoe@domain.com" autocomplete="email"  maxlength="5" autofocus required>
			  <input type="MDP" name="MDP" id="MDP" placeholder="NOT 12346" autocomplete="MDP"  minlength="5" required>
			     </span>
		      </label>
		      <button type="submit">Send your mail</button>
		    </fieldset>
		  </form>
		</div>

	</body>
</html>
